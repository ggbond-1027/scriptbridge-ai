  title: 三条诫命与沈鹤
  dramatic_purpose: 核心揭示。三条诫命不是警告而是封印。沈鹤于1947年消失。照片中第三人面容与沈默极为相似。这不是一起失踪案，是延伸60年的线索。
  conflict: 沈默得知自己与沈鹤面容极为相似——身份认同危机。密室封印已破意味着某种力量已释放。
  characters:
  - char_1
  - char_2
  - char_5
  - char_6
  beats:
  - description: 沈默问周老是否知道三条诫命。周老极为警觉，从床底拖出铁皮箱。
    emotional_arc: 追问 -> 警觉
    key_action: 周老拖出铁皮箱
  - description: 照片揭示：祖父、陆远山、沈鹤三人。沈鹤面容与沈默极为相似。密室就是沈鹤住过的房间。
    emotional_arc: 震惊 -> 认同危机
    key_action: 辨认照片中沈鹤的面容
  - description: 沈鹤1947年消失。这不是一起失踪案，是延伸60年的线索。
    emotional_arc: 认同危机 -> 决断
    key_action: 沈默决定回老宅
  elements:
  - id: el_37
    type: dialogue
    text: 周老，你有没有听说过勿忘、勿寻、勿回这三条诫命？
    character_id: char_1
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_12
  - id: el_38
    type: dialogue
    text: 你从哪里知道这三条诫命？
    character_id: char_6
    parenthetical: 极为警觉
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_13
  - id: el_39
    type: dialogue
    text: 我祖父的密室里。
    character_id: char_1
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_13
  - id: el_40
    type: action
    text: 周老站起身，从床底下拖出铁皮箱。里面是更多手写笔记和几张照片。其中一张照片让沈默怔住了——祖父年轻时和另外两个人站在老宅门前。照片里的第三人面容和沈默极为相似——像是跨越了时间的镜像。
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_14
  - id: el_41
    type: dialogue
    text: 你祖父共有三个至交。陆远山是其中之一，另一个叫沈鹤。沈鹤也在这座宅子里住过。他住的那间房——
    character_id: char_6
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_15
  - id: el_42
    type: dialogue
    text: 就是那间锁着的密室。
    character_id: char_1
    parenthetical: 脱口而出
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_15
  - id: el_43
    type: dialogue
    text: 沈鹤消失后，你的祖父就把那间房锁了。再未打开。直到——有人收到那封信。
    character_id: char_6
    parenthetical: 点头
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_16
  - id: el_44
    type: dialogue
    text: 一九四七年。
    character_id: char_6
    parenthetical: 目光看向窗外
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_17
- id: sc_10
  chapter_ids:
