  title: 沈鹤的笔记本
  dramatic_purpose: 真相揭示。沈鹤的笔记本记录了时间叠影现象和通道的存在——所有谜团的答案。
  conflict: 刑侦理性 vs 超自然真相——沈默多年训练要求只看事实，而事实指向了超越理性的答案。
  characters:
  - char_1
  - char_2
  - char_5
  beats:
  - description: 沈默翻开笔记本——沈鹤记录了时间叠影现象。
    emotional_arc: 阅读 -> 接受
    key_action: 翻开笔记本阅读
  - description: 最后一页：叠影非幻象，两层时间之间有通道。沈鹤选择进入通道面对真相。
    emotional_arc: 接受 -> 平静
    key_action: 合上笔记本
  elements:
  - id: el_55
    type: action
    text: 沈默翻开笔记本。里面用小楷密密麻麻写满了内容——不是日记，而是某种研究记录。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_7
  - id: el_56
    type: note
    text: 叠影非幻象。他们是真实的——他们存在于另一层时间中。当叠合发生时，两层时间之间会产生通道。通过通道，过去的人可以来到现在——而现在的人，也可能被拉回过去。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_8
  - id: el_57
    type: note
    text: 我已经看到了通道。它在雨夜出现，在老宅的密室中。祖父试图封印通道——但封印不是永久的。每隔二十年，通道会重新打开。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_8
  - id: el_58
    type: note
    text: 我即将进入通道。不是被迫——是我选择。因为在另一层时间里，有一个我必须面对的真相。不要试图寻找我。但我可能会——回来。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_9
