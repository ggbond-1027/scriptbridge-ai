  title: 雨夜旧宅
  dramatic_purpose: 建立故事氛围和主角处境。雨夜老宅的孤寂感暗示着某种被时间封存的秘密即将揭开。
  conflict: 沈默的内心冲突——对封闭记忆的抗拒 vs 收到神秘来信后无法忽视的好奇与不安。
  characters:
  - char_1
  beats:
  - description: 沈默站在窗前看雨，老宅的孤寂与雨夜的暗沉交织。
    emotional_arc: 平静 -> 不安
    key_action: 站在窗前观望
  - description: 沈默发现桌上的神秘来信，拆开看到你所遗忘的正在回来。
    emotional_arc: 好奇 -> 冷意蔓延
    key_action: 拆开信件
  elements:
  - id: el_1
    type: action
    text: 秋雨从黄昏开始落下，到深夜仍未停歇。沈默站在老宅二楼的窗前，看着雨水顺着瓦片汇成细流，打在石板路上溅起微光。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_1
  - id: el_2
    type: voice_over
    text: 这座宅子是他祖父留下的，位于江南古镇的巷尾。平日无人居住，只有逢年过节才回来打扫一番。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_1
  - id: el_3
    type: action
    text: |-
      今天他收到了一封信。信用牛皮纸包裹，没有邮戳，没有寄信人地址，正面用毛笔写着沈默亲启四个字。字迹端正，却有一种说不出的古意，像是从几十年前穿越而来。他把信放在书房的旧桌上，犹豫了很久才拆开。里面是一张泛黄的信纸，上面只有一行字：你所遗忘的，正在回来。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_2
      - p_1_3
  - id: el_4
    type: action
    text: 沈默的手微微发抖。这行字让他感到一种冷意——不是恐惧，而是某种更深层的不安，像是被触碰了一段刻意封闭的记忆。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_4
- id: sc_2
  chapter_ids:
  - ch_1
  source_refs:
  - chapter_id: ch_1
    paragraph_ids:
    - p_1_5
    - p_1_6
  heading:
    context: INT
    location_id: loc_1
    time_of_day: NIGHT
  title: 封闭的记忆
  dramatic_purpose: 揭示沈默的心理困境——童年记忆碎片中有一个他不愿想起的雨夜，与当下的雨夜构成呼应。
  conflict: 沈默试图回忆 vs 刻意遗忘——内心对抗。
  characters:
  - char_1
  beats:
  - description: 沈默坐在藤椅上试图回忆，但童年记忆碎片中有一个不愿想起的雨夜。
    emotional_arc: 尝试回忆 -> 回避
    key_action: 坐在藤椅上思考
  elements:
  - id: el_5
    type: action
    text: 沈默坐在书房的藤椅上，试图回忆这封信可能指向什么。祖父去世时他只有七岁。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_5
  - id: el_6
    type: voice_over
    text: 对这座老宅的记忆，只剩下零碎的片段：屋檐下的燕子窝、后院那棵歪脖子的桂花树、以及——一个他不愿想起的夜晚。那个夜晚也是雨夜。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_5
      - p_1_6
- id: sc_3
  chapter_ids:
  - ch_1
  source_refs:
  - chapter_id: ch_1
    paragraph_ids:
    - p_1_7
    - p_1_8
  heading:
    context: INT
    location_id: loc_1
    time_of_day: NIGHT
  title: 方晴来电
  dramatic_purpose: 引入搭档方晴，建立信任关系。沈默隐瞒了信的真正含义，显示他的谨慎和独立。
  conflict: 沈默选择隐瞒 vs 方晴的关切——信任中的缝隙。
  characters:
  - char_1
  - char_2
  beats:
  - description: 方晴来电询问情况，沈默只说没什么，但暗中要求查失踪案。
    emotional_arc: 关切 -> 隐忍
    key_action: 沈默将信折好放入衣袋
  elements:
  - id: el_7
    type: action
    text: 手机响了。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_7
  - id: el_8
    type: dialogue
    text: 你还在老宅？那边什么情况？
    character_id: char_2
    parenthetical: 关切
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_7
  - id: el_9
    type: dialogue
    text: 没什么。我明天回局里，有件事想查一下。
    character_id: char_1
    parenthetical: 平静
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_8
  - id: el_10
    type: dialogue
    text: 什么事？
    character_id: char_2
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_8
  - id: el_11
    type: dialogue
    text: 帮我查一下——二十年前，这个镇上有没有失踪案的记录。
    character_id: char_1
    parenthetical: 沉默两秒后
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_8
  - id: el_12
    type: action
    text: 电话那头安静了片刻。方晴只说了句收到，便挂了电话。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_8
- id: sc_4
  chapter_ids:
  - ch_1
  source_refs:
  - chapter_id: ch_1
    paragraph_ids:
    - p_1_9
    - p_1_10
    - p_1_11
    - p_1_12
    - p_1_13
  heading:
    context: INT
    location_id: loc_2
    time_of_day: NIGHT
  title: 打开密室
  dramatic_purpose: 核心转折点。密室中的照片、诫命纸条和开着的窗户揭示了一个被时间封存的秘密，同时暗示有人（或某种力量）刚刚从这里离开。
  conflict: 沈默的好奇 vs 诫命的警告——勿忘。勿寻。勿回三条诫命直接挑战他追查的决心。
  characters:
  - char_1
  - char_3
  beats:
  - description: 沈默走到走廊尽头，面对从未打开的铜锁门。
    emotional_arc: 犹豫 -> 决断
    key_action: 将铜钥匙插入锁孔
  - description: 密室内部——灰尘凝固、照片、诫命纸条。
    emotional_arc: 震惊 -> 警觉
    key_action: 发现照片和纸条
  - description: 窗户开着，窗台有新鲜湿痕和铜扣——有人刚刚离开。
    emotional_arc: 警觉 -> 恐惧蔓延
    key_action: 发现窗户异常和铜扣
  elements:
  - id: el_13
    type: action
    text: 沈默起身走到走廊尽头，面对一扇从未打开过的门——祖父书房隔壁的房间，门上挂着一把锈迹斑斑的铜锁。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_9
  - id: el_14
    type: action
    text: 他看了看钥匙串，其中有一枚从未试过的铜钥匙——形状和门上的锁孔吻合。他深吸一口气，将钥匙插入锁孔。锁开了。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_10
  - id: el_15
    type: action
    text: 门后的房间里，灰尘铺了厚厚一层，桌椅像是被时间凝固。墙上挂着一幅照片——照片里是年轻时的祖父，旁边站着一个人，面容模糊，穿着民国时期的长衫。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_11
  - id: el_16
    type: note
    text: 照片下方贴着一张纸条，字迹和信上的一模一样：勿忘。勿寻。勿回。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_12
  - id: el_17
    type: action
    text: |-
      三条诫命，三个勿。沈默觉得后颈一阵凉意，像是有人在身后注视着他。他猛然回头——走廊空空荡荡，只有雨声。但他注意到一件异常的事：这个房间的窗户是开的。窗台上有一片新鲜的湿痕——像是有人刚刚从这里离开。沈默的手电扫过窗台，发现一枚老式铜扣，上面刻着一个他从未见过的符号。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_13
