  heading:
    context: INT
    location_id: loc_1
    time_of_day: NIGHT
  title: 陈老的告诫
  dramatic_purpose: 引入外部视角——陈老揭示信的规律（每二十年送达一次），将事件从个人层面提升到超自然层面。陈老的告诫勿寻与沈默的性格形成对抗。
  conflict: 陈老的告诫 vs 沈默的固执——外部警告与主角内驱动力的矛盾。
  characters:
  - char_1
  - char_7
  beats:
  - description: 沈默打电话联系陈老，询问祖父的事。陈老立刻问你是不是打开了那间房。
    emotional_arc: 犹豫 -> 震惊
    key_action: 拨打电话
  - description: 陈老揭示每二十年有人收到信的规律。沈默脊背冷意蔓延全身。陈老告诫勿寻。
    emotional_arc: 震惊 -> 寒意蔓延 -> 固执
    key_action: 握紧手机
  elements:
  - id: el_18
    type: action
    text: 沈默回到书房，拨打了一个很久没用过的号码。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_14
  - id: el_19
    type: dialogue
    text: 陈老，我需要了解一些关于我祖父的事。
    character_id: char_1
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_15
  - id: el_20
    type: dialogue
    text: 沈默……你是不是打开了那间房？
    character_id: char_7
    parenthetical: 苍老而迟缓
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_15
  - id: el_21
    type: dialogue
    text: 你怎么知道？
    character_id: char_1
    parenthetical: 握紧手机
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_16
  - id: el_22
    type: dialogue
    text: 因为那封信。每二十年，都会有人收到那封信。而每一个收到信的人，都会打开那间房。
    character_id: char_7
    parenthetical: 声音在雨夜中格外清晰
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_17
  - id: el_23
    type: action
    text: 沈默感到脊背上的冷意蔓延到了全身。
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_17
  - id: el_24
    type: dialogue
    text: 你接下来要做的事——千万不要去寻。
    character_id: char_7
    parenthetical: 停顿很久后缓缓说出
    source_ref:
      chapter_id: ch_1
      paragraph_ids:
      - p_1_18
- id: sc_6
  chapter_ids:
  - ch_2
  source_refs:
  - chapter_id: ch_2
    paragraph_ids:
    - p_2_1
    - p_2_2
    - p_2_3
  heading:
    context: INT
    location_id: loc_3
    time_of_day: DAY
  title: 档案室调查
  dramatic_purpose: 推进调查——方晴查出二十年前陆远山失踪案记录，将线索从超自然层面回归刑侦层面。
  conflict: 沈默的刑侦理性 vs 超自然线索的冲击。
  characters:
  - char_1
  - char_2
  - char_4
  beats:
  - description: 沈默直奔档案室，方晴已准备好资料。
    emotional_arc: 急迫 -> 发现
    key_action: 翻阅档案
  elements:
  - id: el_25
    type: action
    text: 沈默没有听从陈老的告诫。第二天一早驾车回市里，直奔刑侦队档案室。
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_1
  - id: el_26
    type: action
    text: 方晴已经把资料准备好了——二十年前，古镇确实发生过一起失踪案。失踪者陆远山，男性，五十二岁，中学历史教师。雨夜失踪，案件以原因不明结案。
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_1
  - id: el_27
    type: dialogue
    text: 有意思的是，失踪前一个月，陆远山多次到访你祖父的宅子。邻居看到他们深夜在书房里交谈。
    character_id: char_2
    parenthetical: 翻开档案指着其中一页
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_2
  - id: el_28
    type: action
    text: 沈默将档案中陆远山的照片与密室老照片对比——祖父身旁穿长衫的人体型和轮廓与陆远山相似。
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_3
- id: sc_7
  chapter_ids:
  - ch_2
  source_refs:
  - chapter_id: ch_2
    paragraph_ids:
    - p_2_4
    - p_2_5
    - p_2_6
  heading:
    context: INT
    location_id: loc_3
    time_of_day: DAY
  title: 消失的证词
  dramatic_purpose: 揭示更深层异常——三个目击者的证词全部从档案中失踪。
  conflict: 刑侦逻辑 vs 超自然现象。
  characters:
  - char_1
  - char_2
  beats:
  - description: 方晴揭示陆远山失踪当晚三个目击者看到穿长衫的人影，证词全部失踪。
    emotional_arc: 发现 -> 不安
    key_action: 方晴压低声音说明异常
  elements:
  - id: el_29
    type: dialogue
    text: 我联系了当年的办案民警。陆远山失踪当晚，镇上有三个人声称在雨中看到了一个穿长衫的人，走在巷子里，像是凭空出现又凭空消失。
    character_id: char_2
    parenthetical: 压低声音
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_4
  - id: el_30
    type: dialogue
    text: 三个目击者？他们的证词呢？
    character_id: char_1
    parenthetical: 皱起眉
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_5
  - id: el_31
    type: dialogue
    text: 消失了。三个人，三份证词，全部从档案中失踪。周老说他当年提交了证词，但后来档案复查时这些页码是空的——像是被人精准地抽走了。
    character_id: char_2
    parenthetical: 语气平静但压抑不安
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_6
- id: sc_8
  chapter_ids:
  - ch_2
  source_refs:
  - chapter_id: ch_2
    paragraph_ids:
    - p_2_7
    - p_2_8
    - p_2_9
    - p_2_10
    - p_2_11
  heading:
    context: INT
    location_id: loc_4
    time_of_day: DAY
  title: 周老的笔记
  dramatic_purpose: 关键信息节点。周老保存的私下笔记提供了缺失的证词内容。
  conflict: 周老二十年等待终于有人来问 vs 他的谨慎和恐惧。
  characters:
  - char_1
  - char_6
  beats:
  - description: 周老没有寒暄，直接说等了二十年。翻开私下抄录的笔记。
    emotional_arc: 等待 -> 揭示
    key_action: 翻开手写笔记
  - description: 三个目击者描述高度一致。吴婶说他不是失踪他是回去了。
    emotional_arc: 震惊 -> 寒意
    key_action: 阅读笔记
  elements:
  - id: el_32
    type: dialogue
    text: 我等了二十年，知道迟早有人会来问。
    character_id: char_6
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_7
  - id: el_33
    type: action
    text: 周老翻开一本私下抄录的手写笔记——当年私下抄录所以没有被抽走。
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_8
  - id: el_34
    type: dialogue
    text: 三个目击者：吴婶、小孙、阿亮。他们的描述高度一致——雨夜巷子里，一个穿灰色长衫的男人，走路没有声音，脚步像是踩在水面上。吴婶说那是一张她觉得应该认识却想不起来的脸。
    character_id: char_6
    parenthetical: 翻阅笔记
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_9
  - id: el_35
    type: dialogue
    text: 吴婶现在在哪里？
    character_id: char_1
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_10
  - id: el_36
    type: note
    text: 周老翻到笔记最后一页：他不是失踪。他是回去了。
    source_ref:
      chapter_id: ch_2
      paragraph_ids:
      - p_2_11
- id: sc_9
  chapter_ids:
