  title: 重返老宅
  dramatic_purpose: 故事回归原点。雨又下了——像信号、像召唤。老宅大门敞开、密室门再次开着。
  conflict: 沈默的决心 vs 未知的力量——老宅在等待他。
  characters:
  - char_1
  - char_2
  beats:
  - description: 沈默和方晴赶到古镇。雨又下了。这场雨和二十年前的雨、六十年前的雨是同一场雨。
    emotional_arc: 紧迫 -> 被召唤感
    key_action: 驾车赶回古镇
  - description: 老宅大门敞开。一楼桌上多了一盏燃烧的油灯。
    emotional_arc: 被召唤感 -> 警觉
    key_action: 走进宅子发现油灯
  elements:
  - id: el_48
    type: action
    text: 沈默和方晴在黄昏时分赶到了古镇。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_1
  - id: el_49
    type: voice_over
    text: 雨又下了起来。像是一种信号，像是一种召唤——这场雨和二十年前、六十年前的雨，是同一场雨。从未停止，只是在等待。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_2
  - id: el_50
    type: action
    text: 老宅的大门开着。沈默记得他离开时锁了门——他确信自己锁了门。但此刻门敞开着。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_3
