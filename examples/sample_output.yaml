schema_version: 1.0.0
project:
  id: proj_yuanye_001
  title: 雨夜来信
  source_language: zh-CN
  target_format: screenplay
  adaptation_style:
    genre:
    - 悬疑
    - 惊悚
    tone:
    - 紧张
    - 暗黑
    - 诗意
    dialogue_style: terse
story_bible:
  characters:
  - id: char_1
    name: 沈默
    aliases:
    - 沈队
    role: protagonist
    description: 刑侦队资深警官，十二年刑侦经验。冷静、固执、不愿面对封闭记忆。祖父去世时年仅七岁，此后与老宅产生了难以割裂的联系。
    goals:
    - 追查神秘来信的真相
    - 理解祖父密室中被封印的秘密
    - 面对被自己刻意遗忘的童年记忆
    personality:
    - 冷静
    - 固执
    - 压抑
    - 直觉敏锐
    appearance: 三十余岁男性，面容沉稳，目光锐利。身材偏瘦但结实，穿着深色外套，习惯将手插在衣袋中。
    first_appearance:
      chapter_id: ch_1
      paragraph_id: p_1_1
    relationships:
    - character_id: char_2
      type: colleague
      description: 刑侦搭档，彼此信任，方晴是唯一不会追问多余问题的人。
    - character_id: char_3
      type: family
      description: 沈默的祖父，已故。留下老宅和密室中的谜团。
    - character_id: char_5
      type: other
      description: 面容极为相似，像是跨越时间的镜像。沈鹤与沈默之间可能存在家族血脉的深层联系。
  - id: char_2
    name: 方晴
    aliases: []
    role: supporting
    description: 刑侦队成员，沈默的搭档。冷静、专业、不多问。是沈默最信任的人。
    goals:
    - 协助沈默追查真相
    - 保护沈默的安全
    personality:
    - 冷静
    - 克制
    - 忠诚
    appearance: 年轻女性，穿着干练，目光沉稳。佩枪时动作熟练。
    first_appearance:
      chapter_id: ch_1
      paragraph_id: p_1_6
    relationships:
    - character_id: char_1
      type: colleague
      description: 沈默的刑侦搭档，彼此信任。
  - id: char_3
    name: 沈默祖父
    aliases:
    - 沈老爷
    role: supporting
    description: 沈默的祖父，已故。年轻时与陆远山、沈鹤有深厚联系。知道时间叠影的秘密，试图封印密室中的通道。
    goals:
    - 封印时间通道
    - 保护后人
    personality:
    - 隐忍
    - 睿智
    appearance: 照片中为年轻时的样貌，面容刚毅。老年时的样貌在沈默的童年记忆中模糊不清。
    first_appearance:
      chapter_id: ch_1
      paragraph_id: p_1_1
    relationships:
    - character_id: char_1
      type: family
      description: 沈默的祖父，去世时沈默年仅七岁。
    - character_id: char_4
      type: friend
      description: 至交好友，陆远山深夜多次到访老宅与祖父交谈。
    - character_id: char_5
      type: friend
      description: 至交好友，面容与祖父极为相似。沈鹤消失后被祖父封印密室。
  - id: char_4
    name: 陆远山
    aliases: []
    role: supporting
    description: 古镇中学历史教师，五十二岁失踪。失踪前一个月多次深夜到访沈默祖父的宅子。穿灰色长衫在雨夜巷子中被目击——可能是从另一层时间走过来的。
    goals:
    - 探索时间叠影的秘密
    - 面对另一层时间中的真相
    personality:
    - 温和
    - 沉稳
    - 执着
    appearance: 面容温和，戴眼镜，穿灰色长衫。照片中面容模糊但体型与旁人相近。
    first_appearance:
      chapter_id: ch_2
      paragraph_id: p_2_2
    relationships:
    - character_id: char_3
      type: friend
      description: 至交好友，深夜多次到访老宅与沈默祖父交谈。
  - id: char_5
    name: 沈鹤
    aliases: []
    role: antagonist
    description: 沈默祖父的至交，与祖父面容极为相似。一九四七年消失——比陆远山早四十年。留下笔记本记录时间叠影的研究。在雨夜中向沈默做出邀请手势。
    goals:
    - 完成时间叠影的研究
    - 面对另一层时间中的真相
    personality:
    - 决绝
    - 无畏
    - 神秘
    appearance: 穿灰色长衫，面容与沈默祖父极为相似，也与沈默极为相似——像是跨越时间的镜像。
    first_appearance:
      chapter_id: ch_2
      paragraph_id: p_2_14
    relationships:
    - character_id: char_3
      type: friend
      description: 至交好友，面容与祖父极为相似。
    - character_id: char_1
      type: other
      description: 面容极为相似，可能是家族血脉的深层联系。
  - id: char_6
    name: 周老
    aliases:
    - 周警官
    role: supporting
    description: 当年办案民警，退休后住在市郊。保存了私下抄录的手写笔记。知道三条诫命的含义。警告沈默密室封印已破。
    goals:
    - 等待二十年，终于有人来问真相
    - 警告沈默危险
    personality:
    - 谨慎
    - 洞察
    appearance: 比实际年龄更显老，双手微微颤抖，但目光仍锐利。
    first_appearance:
      chapter_id: ch_2
      paragraph_id: p_2_8
    relationships: []
  - id: char_7
    name: 陈老
    aliases: []
    role: extra
    description: 沈默电话联系的老前辈，知道每二十年有人收到信的规律。
    goals:
    - 传达告诫
    personality:
    - 苍老
    - 迟缓
    appearance: 电话中出现，未见面。声音苍老。
    first_appearance:
      chapter_id: ch_1
      paragraph_id: p_1_18
    relationships: []
  locations:
  - id: loc_1
    name: 沈默老宅
    type: mixed
    description: 江南古镇巷尾的老宅，沈默祖父留下。二楼有书房和密室，后院有桂花树。平日无人居住，逢年过节才打扫。
    atmosphere: 孤寂、阴沉、时间停滞
    first_appearance:
      chapter_id: ch_1
      paragraph_id: p_1_1
  - id: loc_2
    name: 老宅密室
    type: interior
    description: 祖父书房隔壁的房间，门上铜锁锈迹斑斑。室内灰尘铺了厚层，桌椅被时间凝固。墙上挂着照片和纸条。沈鹤曾住此间。
    atmosphere: 封印、尘封、禁忌
    first_appearance:
      chapter_id: ch_1
      paragraph_id: p_1_11
  - id: loc_3
    name: 刑侦队档案室
    type: interior
    description: 市里刑侦队的档案室，方晴在此准备二十年前失踪案的资料。
    atmosphere: 秩序、严谨
    first_appearance:
      chapter_id: ch_2
      paragraph_id: p_2_1
  - id: loc_4
    name: 周老住所
    type: interior
    description: 市郊老式居民楼，周老坐在旧沙发上，保存了私下抄录的笔记。
    atmosphere: 苍老、谨慎
    first_appearance:
      chapter_id: ch_2
      paragraph_id: p_2_8
  - id: loc_5
    name: 古镇巷子
    type: exterior
    description: 江南古镇的石板路巷子。雨夜中曾有穿长衫的人影被目击，走路无声像是踩在水面上。巷子尽头有雨幕中的空间缝隙——时间通道。
    atmosphere: 古老、潮湿、神秘
    first_appearance:
      chapter_id: ch_2
      paragraph_id: p_2_4
  - id: loc_6
    name: 老宅后院
    type: exterior
    description: 桂花树所在的后院。歪脖子桂花树是沈默童年记忆中唯一温暖的部分，也是连接两层时间的锚点。
    atmosphere: 芬芳、怀旧、锚定
    first_appearance:
      chapter_id: ch_3
      paragraph_id: p_3_20
  timeline:
  - id: tl_1
    chapter_id: ch_1
    sequence: 1
    event_summary: 沈默在雨夜收到神秘来信，信上写着你所遗忘的正在回来。
    affected_characters:
    - char_1
  - id: tl_2
    chapter_id: ch_1
    sequence: 2
    event_summary: 沈默用铜钥匙打开祖父密室，发现密室中照片和纸条，窗户开着有人刚刚离开。
    affected_characters:
    - char_1
    - char_3
  - id: tl_3
    chapter_id: ch_1
    sequence: 3
    event_summary: 沈默联系陈老，得知每二十年都有人收到那封信并打开密室。陈老告诫勿寻。
    affected_characters:
    - char_1
    - char_7
  - id: tl_4
    chapter_id: ch_2
    sequence: 1
    event_summary: 方晴查出二十年前陆远山失踪案记录，失踪前频繁到访老宅。
    affected_characters:
    - char_1
    - char_2
    - char_4
  - id: tl_5
    chapter_id: ch_2
    sequence: 2
    event_summary: 方晴发现三个目击者证词全部从档案中失踪，周老保存了私下抄录。
    affected_characters:
    - char_2
    - char_6
  - id: tl_6
    chapter_id: ch_2
    sequence: 3
    event_summary: 周老揭示三个目击者在半年内全部离开镇子，吴婶说他不是失踪他是回去了。
    affected_characters:
    - char_1
    - char_6
  - id: tl_7
    chapter_id: ch_2
    sequence: 4
    event_summary: 沈默看到照片中第三人面容与自己极为相似——那人叫沈鹤，一九四七年消失。密室就是沈鹤住过的房间。
    affected_characters:
    - char_1
    - char_5
  - id: tl_8
    chapter_id: ch_2
    sequence: 5
    event_summary: 周老警告密室封印已破，它出来了。
    affected_characters:
    - char_1
    - char_6
  - id: tl_9
    chapter_id: ch_3
    sequence: 1
    event_summary: 沈默和方晴赶回老宅，发现大门敞开、密室门再次开着、密室中灰尘消失纸条更换。
    affected_characters:
    - char_1
    - char_2
  - id: tl_10
    chapter_id: ch_3
    sequence: 2
    event_summary: 沈默发现沈鹤的笔记本，记录时间叠影现象和通道的存在。
    affected_characters:
    - char_1
    - char_5
  - id: tl_11
