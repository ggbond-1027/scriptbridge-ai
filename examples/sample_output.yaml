  title: 雨中沈鹤
  dramatic_purpose: 超自然现象的直接呈现。沈鹤站在桂花树下——不是幻影，是真实的存在。
  conflict: 沈默的刑侦理性 vs 超自然的直接呈现。
  characters:
  - char_1
  - char_2
  - char_5
  beats:
  - description: 雨幕中一个身影站在后院桂花树下——穿灰色长衫的沈鹤。
    emotional_arc: 确认 -> 面对
    key_action: 看清沈鹤的面容
  - description: 沈鹤做出邀请手势，转身消失在雨幕中。沈默按住方晴的手——他不是威胁。他是线索。
    emotional_arc: 面对 -> 选择
    key_action: 按住方晴的手
  elements:
  - id: el_63
    type: action
    text: 窗外，雨幕中，一个身影正站在后院的桂花树下。穿着灰色长衫，走路没有声音。那人缓缓转身。沈默看清了他的脸——那是沈鹤的脸。和照片里一模一样。和沈默——极为相似。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_12
  - id: el_64
    type: action
    text: 沈鹤抬起手，做了一个手势——不是招呼，不是警告，是一种邀请。然后他转身，消失在雨幕中。方晴握住枪柄，沈默按住了她的手。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_13
  - id: el_65
    type: dialogue
    text: 不用。他不是威胁。他是——线索。
    character_id: char_1
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_13
