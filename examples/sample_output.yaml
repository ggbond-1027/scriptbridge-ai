- id: ch_002
  order: 2
  title: 第二章 旧街钟楼
  text: '第二天夜里，林舟来到旧街。钟楼已经停摆多年，楼下的小卖部换成了无人值守的便利店。


    一个穿灰色风衣的男人站在钟楼阴影里。他没有介绍自己，只把一只录音笔递给林舟。


    录音笔里传出父亲的声音：“不要相信报社里的人，尤其是周启明。”


    林舟握紧录音笔，抬头时男人已经不见了。便利店的玻璃门上映出另一个身影，周启明正站在街对面看着她。'
  paragraphs:
  - id: p_002_001
    chapter_id: ch_002
    index: 1
