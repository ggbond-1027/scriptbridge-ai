  title: 密室异变
  dramatic_purpose: 密室状态改变是关键信号——灰尘消失、纸条更换、沈鹤的笔记本出现。
  conflict: 密室的改变 vs 沈默的预期——空间本身在回应他的选择。
  characters:
  - char_1
  - char_2
  beats:
  - description: 密室门再次开着。密室内灰尘消失，纸条更换。
    emotional_arc: 警觉 -> 确认异变
    key_action: 走进密室发现变化
  elements:
  - id: el_51
    type: dialogue
    text: 二楼。
    character_id: char_1
    parenthetical: 低声
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_4
  - id: el_52
    type: action
    text: 走廊尽头，密室的门再次开着。密室里灰尘不见了，地面干净，桌椅整齐。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_5
  - id: el_53
    type: note
    text: 墙上照片还在，但勿忘。勿寻。勿回的纸条不见了。取而代之的是你已回。所见即真。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
      - p_3_5
  - id: el_54
    type: action
    text: 窗台上坐着一本旧笔记本，封面写着一个名字：沈鹤。
    source_ref:
      chapter_id: ch_3
      paragraph_ids:
