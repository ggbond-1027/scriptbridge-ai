    affected_characters:
    - char_1
    - char_5
  - id: tl_12
    chapter_id: ch_3
    sequence: 4
    event_summary: 沈默选择走进雨幕中的时间通道。方晴在老宅等待。
    affected_characters:
    - char_1
    - char_2
chapters:
- id: ch_1
  order: 1
  title: 旧宅来信
  source_title: 第一章 旧宅来信
  paragraphs:
  - id: p_1_1
    index: 1
    text: 旧宅来信
    char_start: 0
    char_end: 4
  - id: p_1_2
    index: 2
    text: 秋雨从黄昏开始落下，到深夜仍未停歇。沈默站在老宅二楼的窗前，看着雨水顺着瓦片汇成细流，打在石板路上溅起微光。这座宅子是他祖父留下的，位于江南古镇的巷尾，平日无人居住，只有逢年过节他才回来打扫一番。
    char_start: 5
    char_end: 103
  - id: p_1_3
    index: 3
    text: 今天不同。今天他收到了一封信。
    char_start: 104
    char_end: 119
  - id: p_1_4
    index: 4
    text: 信是用牛皮纸包裹的，没有邮戳，没有寄信人地址，只在正面用毛笔写着"沈默亲启"四个字。字迹端正，却有一种说不出的古意，像是从几十年前穿越而来。他把信放在书房的旧桌上，犹豫了很久才拆开。
    char_start: 120
    char_end: 211
  - id: p_1_5
    index: 5
    text: 里面是一张泛黄的信纸，上面只有一行字：
    char_start: 212
    char_end: 231
  - id: p_1_6
    index: 6
    text: '"你所遗忘的，正在回来。"'
    char_start: 232
    char_end: 245
  - id: p_1_7
    index: 7
    text: 沈默的手微微发抖。他不是胆小的人——在刑侦队干了十二年，见过太多生死，早已对恐惧免疫。但这行字让他感到一种冷意，不是恐惧，而是某种更深层的不安，像是被触碰了一段刻意封闭的记忆。
    char_start: 246
    char_end: 334
  - id: p_1_8
    index: 8
    text: 他坐在书房的藤椅上，试图回忆这封信可能指向什么。祖父去世时他只有七岁，之后便随母亲搬到城里。对这座老宅的记忆，只剩下零碎的片段：屋檐下的燕子窝、后院那棵歪脖子的桂花树、以及——一个他不愿想起的夜晚。
    char_start: 335
    char_end: 434
  - id: p_1_9
    index: 9
    text: 那个夜晚也是雨夜。
    char_start: 435
    char_end: 444
  - id: p_1_10
    index: 10
    text: '"沈队？"手机响了。是搭档方晴的声音，"你还在老宅？那边什么情况？"'
    char_start: 445
    char_end: 479
  - id: p_1_11
    index: 11
    text: '"没什么，"沈默把信折好放进衣袋，"我明天回局里，有件事想查一下。"'
    char_start: 480
    char_end: 514
  - id: p_1_12
    index: 12
    text: '"什么事？"'
    char_start: 515
    char_end: 521
  - id: p_1_13
    index: 13
    text: 沈默沉默了两秒："方晴，帮我查一下——二十年前，这个镇上有没有失踪案的记录。"
    char_start: 522
    char_end: 561
  - id: p_1_14
    index: 14
    text: 电话那头安静了片刻。方晴是那种不会追问多余问题的人，她只说了句"收到"，便挂了电话。
    char_start: 562
    char_end: 604
  - id: p_1_15
    index: 15
    text: |-
      雨声填满了宅子里的沉默。沈默起身走到走廊尽头，那里有一扇他从未打开过的门——祖父书房隔壁的房间，门上挂着一把铜锁，锈迹斑斑。他小时候问过母亲那间房是做什么的，母亲的回答总是"那是你爷爷放旧物的地方，不用管"。
    char_start: 605
    char_end: 709
  - id: p_1_16
    index: 16
    text: 但现在，信上的字让那扇门变得不同了。他看了看手里的钥匙串，其中有一枚他从未试过的铜钥匙——形状和门上的锁孔吻合。
    char_start: 710
    char_end: 766
  - id: p_1_17
    index: 17
    text: 他站在门前，雨水渗过屋脊在某处滴答作响。他深吸一口气，将钥匙插入锁孔。
    char_start: 767
    char_end: 802
  - id: p_1_18
    index: 18
    text: 锁开了。
    char_start: 803
    char_end: 807
  - id: p_1_19
    index: 19
    text: 门后的房间里，灰尘铺了厚厚一层，桌椅像是被时间凝固。墙上挂着一幅照片——照片里是年轻时的祖父，旁边站着一个人，面容模糊，但穿着的衣裳样式很旧，像是民国时期的长衫。
    char_start: 808
    char_end: 889
  - id: p_1_20
    index: 20
    text: 照片下方贴着一张纸条，上面的字迹和信上的一模一样：
    char_start: 890
    char_end: 915
  - id: p_1_21
    index: 21
    text: '"勿忘。勿寻。勿回。"'
    char_start: 916
    char_end: 927
  - id: p_1_22
    index: 22
    text: 三条诫命，三个"勿"。沈默觉得后颈一阵凉意，像是有人在身后注视着他。他猛然回头——走廊空空荡荡，只有雨声。
    char_start: 928
    char_end: 981
  - id: p_1_23
    index: 23
    text: 但他注意到一件异常的事：这个房间的窗户是开的。一扇本该锁死的窗，此刻正迎着夜雨微微晃动，窗台上有一片新鲜的湿痕——像是有人刚刚从这里离开。
    char_start: 982
    char_end: 1051
  - id: p_1_24
    index: 24
    text: 沈默的手电扫过窗台，在湿痕旁边看到了一个东西：一枚老式铜扣，像是大衣上的装饰扣，上面刻着一个他从未见过的符号。
    char_start: 1052
    char_end: 1107
  - id: p_1_25
    index: 25
    text: 他把铜扣收起，关上窗户，锁好房门。回到书房后，他拿出笔记本，记下了今天的发现。然后他拨打了一个号码——这个号码他已经很久没用了。
    char_start: 1108
    char_end: 1172
  - id: p_1_26
    index: 26
    text: '"陈老，"他对电话那头说，"我需要了解一些关于我祖父的事。"'
    char_start: 1173
    char_end: 1203
  - id: p_1_27
    index: 27
    text: 电话那头的声音苍老而迟缓："沈默……你是不是打开了那间房？"
    char_start: 1204
    char_end: 1234
  - id: p_1_28
    index: 28
    text: 沈默的手握紧了手机："你怎么知道？"
    char_start: 1235
    char_end: 1253
  - id: p_1_29
    index: 29
    text: '"因为那封信，"陈老的声音在雨夜里显得格外清晰，"每二十年，都会有人收到那封信。而每一个收到信的人，都会打开那间房。"'
    char_start: 1254
    char_end: 1313
  - id: p_1_30
    index: 30
    text: 沈默感到脊背上的冷意蔓延到了全身。
    char_start: 1314
    char_end: 1331
  - id: p_1_31
    index: 31
    text: '"你接下来要做的事——"陈老停顿了很久，才缓缓说出最后几个字，"——千万不要去寻。"'
    char_start: 1332
    char_end: 1374
  summary: 沈默在雨夜收到神秘来信，打开祖父密室发现照片和诫命纸条，窗户被打开有人刚刚离开。陈老告诫此信每二十年送达一次，勿寻勿追问。
- id: ch_2
  order: 2
  title: 消失的证人
  source_title: 第一章 消失的证人
  paragraphs:
  - id: p_2_1
    index: 1
    text: 消失的证人
    char_start: 0
    char_end: 5
  - id: p_2_2
    index: 2
    text: 沈默没有听从陈老的告诫。
    char_start: 6
    char_end: 18
  - id: p_2_3
    index: 3
    text: |-
      第二天一早，他驾车回到市里，直奔刑侦队的档案室。方晴已经把资料准备好了——二十年前，这个古镇确实发生过一起失踪案。失踪者名叫陆远山，男性，当时五十二岁，是镇上中学的历史教师。据记录，陆远山在一个雨夜离开住所后便再未出现，家中没有留下任何线索，案件最终以"原因不明"结案。
    char_start: 19
    char_end: 154
  - id: p_2_4
    index: 4
    text: '"有意思的是，"方晴把档案翻开，指着其中一页，"失踪前一个月，陆远山多次到访你祖父的宅子。邻居看到他们深夜在书房里交谈。"'
    char_start: 155
    char_end: 216
  - id: p_2_5
    index: 5
    text: 沈默看着档案中陆远山的照片——面容温和，眼镜后面是一双沉稳的眼睛。他将照片和昨夜在密室里看到的那张老照片对比：祖父身旁那人穿着长衫，面容模糊，但体型和轮廓与陆远山相似。
    char_start: 217
    char_end: 301
  - id: p_2_6
    index: 6
    text: |-
      "还有一件事，"方晴的声音压低了，"我联系了当年的办案民警，姓周，退休后住在市郊。他说他现在不愿意谈这个案子，但——他提到一个细节：陆远山失踪当晚，镇上有三个人声称在雨中看到了一个'穿长衫的人'，走在巷子里，像是凭空出现又凭空消失。"
    char_start: 302
    char_end: 419
  - id: p_2_7
    index: 7
    text: 沈默皱起眉："三个目击者？他们的证词呢？"
    char_start: 420
    char_end: 441
  - id: p_2_8
    index: 8
    text: '"消失了，"方晴的语气很平静，但沈默听出了其中压抑的不安，"三个人，三份证词，全部从档案中失踪。周老说他当年提交了证词，但后来档案复查时这些页码是空的——像是被人精准地抽走了。"'
    char_start: 442
    char_end: 531
  - id: p_2_9
    index: 9
    text: 沈默站起来，走到窗边。窗外是灰蒙蒙的天，像是昨夜的雨意尚未散尽。
    char_start: 532
    char_end: 564
  - id: p_2_10
    index: 10
    text: '"我们去见周老，"他说。'
    char_start: 565
    char_end: 577
  - id: p_2_11
    index: 11
    text: 市郊的老式居民楼里，周老坐在客厅的旧沙发上。他看上去比实际年龄更老，双手微微颤抖，但目光仍然锐利。
    char_start: 578
    char_end: 627
  - id: p_2_12
    index: 12
    text: '"我等了二十年，"周老没有寒暄，直接说，"知道迟早有人会来问。"'
    char_start: 628
    char_end: 660
  - id: p_2_13
    index: 13
    text: 他翻开一本自己保存的手写笔记——这是他当年私下抄录的，所以没有被抽走。
    char_start: 661
    char_end: 696
  - id: p_2_14
    index: 14
    text: |-
      "三个目击者：杂货铺老板娘吴婶、邮递员小孙、还有镇东头茶馆的伙计阿亮。他们的描述高度一致——雨夜，巷子里，一个穿灰色长衫的男人，走路没有声音，脚步像是踩在水面上。吴婶说她看清了那人的脸——那是一张她从未在镇上见过的脸，但不是陌生人的脸，而是一张让她觉得'应该认识却想不起来'的脸。"
    char_start: 697
    char_end: 838
  - id: p_2_15
    index: 15
    text: 沈默追问："吴婶现在在哪里？"
    char_start: 839
    char_end: 854
  - id: p_2_16
    index: 16
    text: 周老摇头："失踪了。三个目击者，在证词被抽走之后的半年内，全部离开了镇子。吴婶的杂货铺一夜之间关门，小孙辞了邮局的工作去了南方，阿亮……阿亮是最后一个，他在离开前对邻居说了一句奇怪的话。"
    char_start: 855
    char_end: 949
  - id: p_2_17
    index: 17
    text: '"什么话？"'
    char_start: 950
    char_end: 956
  - id: p_2_18
    index: 18
    text: 周老翻到笔记最后一页，上面写着：
    char_start: 957
    char_end: 973
  - id: p_2_19
    index: 19
    text: '"''他不是失踪。他是回去了。''"'
    char_start: 974
    char_end: 990
  - id: p_2_20
    index: 20
    text: 沈默感到一阵寒意。这句话和他收到的信——"你所遗忘的，正在回来"——构成了某种呼应，像是二十年前就埋下的伏笔。
    char_start: 991
    char_end: 1046
  - id: p_2_21
    index: 21
    text: '"周老，你有没有听说过''勿忘、勿寻、勿回''这三条诫命？"'
    char_start: 1047
    char_end: 1075
  - id: p_2_22
    index: 22
    text: 周老的手停在了笔记上。他抬起头，目光变得极为警觉："你从哪里知道这三条诫命？"
    char_start: 1076
    char_end: 1115
  - id: p_2_23
    index: 23
    text: '"我祖父的密室里。"'
    char_start: 1116
    char_end: 1126
  - id: p_2_24
    index: 24
    text: 周老沉默了很久。然后他站起身，走到卧室，从床底下拖出一个铁皮箱。箱子打开后，里面是更多手写笔记，还有几张照片。
    char_start: 1127
    char_end: 1182
  - id: p_2_25
    index: 25
    text: 其中一张照片让沈默怔住了——照片里是祖父年轻时，和另外两个人站在老宅门前。一个穿着长衫（陆远山），另一个……沈默仔细看那张脸，然后看向方晴。
    char_start: 1183
    char_end: 1253
  - id: p_2_26
    index: 26
    text: 方晴也看到了。她的嘴唇微微张开。
    char_start: 1254
    char_end: 1270
  - id: p_2_27
    index: 27
    text: 照片里的第三人，面容和沈默一模一样。
    char_start: 1271
    char_end: 1289
  - id: p_2_28
    index: 28
    text: 不——不是一模一样。是极为相似，像是跨越了时间的镜像。周老在一旁说："你祖父共有三个至交。陆远山是其中之一，另一个叫沈鹤——"
    char_start: 1290
    char_end: 1353
  - id: p_2_29
    index: 29
    text: '"沈鹤？"沈默的声音紧了。'
    char_start: 1354
    char_end: 1367
  - id: p_2_30
    index: 30
    text: '"沈鹤，和你同姓，"周老看着他，"镇上的人说，沈鹤和你祖父长得极像。而且——沈鹤也在这座宅子里住过。他住的那间房——"'
    char_start: 1368
    char_end: 1427
  - id: p_2_31
    index: 31
    text: 沈默脱口而出："就是那间锁着的密室。"
    char_start: 1428
    char_end: 1447
  - id: p_2_32
    index: 32
    text: 周老点头："沈鹤消失后，你的祖父就把那间房锁了。再未打开。直到——有人收到那封信。"
    char_start: 1448
    char_end: 1490
  - id: p_2_33
    index: 33
    text: 方晴此时开口："周老，沈鹤是什么时候消失的？"
    char_start: 1491
    char_end: 1514
  - id: p_2_34
    index: 34
    text: 周老合上笔记，目光看向窗外："一九四七年。"
    char_start: 1515
    char_end: 1537
  - id: p_2_35
    index: 35
    text: 那是一九四七年。距陆远山失踪的四十年前。距现在——六十年。
    char_start: 1538
    char_end: 1567
  - id: p_2_36
    index: 36
    text: 沈默看向方晴，方晴也看向他。两人都明白了一件事：这不是一起失踪案，这是一条延伸了六十年的线索，连接着三个人、两间密室、和一封每二十年准时送达的信。
    char_start: 1568
    char_end: 1641
  - id: p_2_37
    index: 37
    text: '"我需要回去，"沈默站起来，"回老宅。"'
    char_start: 1642
    char_end: 1662
  - id: p_2_38
    index: 38
    text: 周老抓住他的手腕，力气出奇的大："你听我说。那三条诫命不是警告——是封印。你祖父锁上那间房，不是要藏什么，是要关住什么。你打开门的那一刻，封印就破了。现在——"
    char_start: 1663
    char_end: 1743
  - id: p_2_39
    index: 39
    text: 他的声音在颤抖："——它出来了。"
    char_start: 1744
    char_end: 1761
  summary: 沈默追查二十年前的失踪案，发现陆远山失踪当晚有三个目击者看到穿长衫的人影。三个证人证词全部从档案中失踪，证人也全部离开镇子。周老揭示沈鹤于1947年消失，密室就是沈鹤住过的房间。周老警告密室封印已破。
- id: ch_3
  order: 3
  title: 雨夜真相
  source_title: 第一章 雨夜真相
  paragraphs:
  - id: p_3_1
    index: 1
    text: 雨夜真相
    char_start: 0
    char_end: 4
  - id: p_3_2
    index: 2
    text: 沈默和方晴在黄昏时分赶到了古镇。
    char_start: 5
    char_end: 21
  - id: p_3_3
    index: 3
    text: 雨又下了起来。像是一种信号，像是一种召唤——沈默觉得这场雨和二十年前陆远山失踪时的雨、和六十年前沈鹤消失时的雨，是同一场雨。从未停止，只是在等待。
    char_start: 22
    char_end: 95
  - id: p_3_4
    index: 4
    text: 老宅的大门开着。沈默记得他离开时锁了门——他确信自己锁了门。但此刻门敞开着，像是有人——或者有什么——在等他回来。
    char_start: 96
    char_end: 153
  - id: p_3_5
    index: 5
    text: 方晴握紧了腰间的佩枪。她是刑侦队里最冷静的人，但此刻她的呼吸微不可闻地加快了。
    char_start: 154
    char_end: 193
  - id: p_3_6
    index: 6
    text: 两人走进宅子。一楼客厅里，家具的位置没变，但桌上多了一样东西——一盏油灯，灯芯还在燃烧，微弱的光在雨声中摇曳。这不是沈默留下的，老宅里不应该有油灯——这是祖父时代的东西。
    char_start: 194
    char_end: 279
  - id: p_3_7
    index: 7
    text: '"二楼，"沈默低声说。'
    char_start: 280
    char_end: 291
  - id: p_3_8
    index: 8
    text: 他们沿着楼梯上去。走廊尽头，那间密室的门——再次开着。
    char_start: 292
    char_end: 319
  - id: p_3_9
    index: 9
    text: 沈默上次离开时锁了门。他再次确信这一点。但门开着，像是那把铜锁从未存在过。
    char_start: 320
    char_end: 357
  - id: p_3_10
    index: 10
    text: 密室里的灰尘不见了。地面干净，桌椅整齐，墙上的照片还在——但那张写着"勿忘。勿寻。勿回。"的纸条不见了。
    char_start: 358
    char_end: 410
  - id: p_3_11
    index: 11
    text: 取而代之的是另一张纸条，字迹依旧是那种古意的毛笔字：
    char_start: 411
    char_end: 437
  - id: p_3_12
    index: 12
    text: '"你已回。所见即真。"'
    char_start: 438
    char_end: 449
  - id: p_3_13
    index: 13
    text: 沈默看向窗边——上次他发现的那扇开着的窗，此刻关着。但窗台上不再是一片湿痕，而是坐着一个东西——一本旧笔记本，封面写着一个名字：沈鹤。
    char_start: 450
    char_end: 517
  - id: p_3_14
    index: 14
    text: 方晴走近，低声说："这是沈鹤的？"
    char_start: 518
    char_end: 535
  - id: p_3_15
    index: 15
    text: |-
      沈默翻开笔记本。里面用小楷密密麻麻写满了内容——不是日记，而是某种研究记录。沈鹤在记录一种"时间叠影"的现象：同一个地点，在不同时间发生的事情，会在特定条件下——通常是雨夜——产生叠合，使得过去的人影出现在当下。
    char_start: 536
    char_end: 642
  - id: p_3_16
    index: 16
    text: 笔记的最后一页，字迹变得潦草，像是在极度紧张中写下的：
    char_start: 643
    char_end: 670
  - id: p_3_17
    index: 17
    text: '"叠影非幻象。他们是真实的——他们存在于另一层时间中。当叠合发生时，两层时间之间会产生通道。通过通道，过去的人可以来到现在——而现在的人，也可能被拉回过去。'
    char_start: 671
    char_end: 749
  - id: p_3_18
    index: 18
    text: '"我已经看到了通道。它在雨夜出现，在老宅的密室中。我祖父知道这件事，他试图封印通道——但封印不是永久的。每隔二十年，通道会重新打开。'
    char_start: 750
    char_end: 816
  - id: p_3_19
    index: 19
    text: '"我即将进入通道。不是被迫——是我选择。因为在另一层时间里，有一个我必须面对的真相。'
    char_start: 817
    char_end: 859
  - id: p_3_20
    index: 20
    text: '"如果后来有人读到这些——不要试图寻找我。你找不到。但我可能会——回来。"'
    char_start: 860
    char_end: 897
  - id: p_3_21
    index: 21
    text: 沈默合上笔记本。他的手不再颤抖，一种奇异的平静覆盖了他。多年的刑侦训练让他学会在证据面前放下情绪，只看事实——而现在，所有事实都指向同一个结论。
    char_start: 898
    char_end: 970
  - id: p_3_22
    index: 22
    text: 方晴说："沈队，这解释了——"
    char_start: 971
    char_end: 986
  - id: p_3_23
    index: 23
    text: |-
      "解释了所有事，"沈默点头，"陆远山穿长衫出现在巷子里——他不是幻影，他是从另一层时间走过来的。三个目击者被抽走证词——不是人为，而是某种力量在抹除两层时间交叉的痕迹。吴婶说'他不是失踪，他是回去了'——她看到了真相。"
    char_start: 987
    char_end: 1097
  - id: p_3_24
    index: 24
    text: 他看向密室的窗。雨正在窗外织成一面帘幕。
    char_start: 1098
    char_end: 1118
  - id: p_3_25
    index: 25
    text: '"而现在，"沈默走到窗前，"通道又打开了。"'
    char_start: 1119
    char_end: 1141
  - id: p_3_26
    index: 26
    text: 窗外，雨幕中，一个身影正站在后院的桂花树下。穿着灰色长衫，走路没有声音。那人缓缓转身——沈默看清了他的脸。
    char_start: 1142
    char_end: 1195
  - id: p_3_27
    index: 27
    text: 那是沈鹤的脸。和照片里一模一样。和沈默——极为相似。
    char_start: 1196
    char_end: 1222
  - id: p_3_28
    index: 28
    text: 沈鹤抬起手，做了一个手势。不是招呼，不是警告——是一种邀请。然后他转身，走向后院深处，消失在雨幕中。
    char_start: 1223
    char_end: 1273
  - id: p_3_29
    index: 29
    text: 方晴走到沈默身旁，也看到了雨中的人影。她的手已经握住了枪柄，但沈默按住了她的手。
    char_start: 1274
    char_end: 1314
  - id: p_3_30
    index: 30
    text: '"不用，"他说，"他不是威胁。他是——线索。"'
    char_start: 1315
    char_end: 1338
  - id: p_3_31
    index: 31
    text: 沈默打开窗户，雨水扑面而来。他深吸一口气，做出了和沈鹤同样的选择——不是被迫，是他选择。
    char_start: 1339
    char_end: 1383
  - id: p_3_32
    index: 32
    text: '"方晴，"他回头看着搭档，"如果我——像沈鹤那样——消失一段时间，不要找我。等我回来。"'
    char_start: 1384
    char_end: 1428
  - id: p_3_33
    index: 33
    text: 方晴的眼睛里有太多话，但她最终只说了一句："我等你。"
    char_start: 1429
    char_end: 1456
  - id: p_3_34
    index: 34
    text: 沈默翻出窗户，走进雨中。后院的桂花树在夜雨中散发着浓郁的香气，那棵歪脖子树——他童年记忆中唯一温暖的部分——此刻像是连接两层时间的锚点。
    char_start: 1457
    char_end: 1525
  - id: p_3_35
    index: 35
    text: 他沿着沈鹤消失的方向走去。雨声越来越响，像是整座古镇都在回响某种古老的韵律。巷子里的石板路泛着水光，每一块石板都像是镜面，映出一个不属于当下的世界。
    char_start: 1526
    char_end: 1600
  - id: p_3_36
    index: 36
    text: |-
      在巷子的尽头，沈默看到了一扇门——不是实体的门，而是雨幕中的一个缝隙，像是空间被折出了一道折痕。缝隙里有微光，和一种遥远的、像是从几十年前传来的声音——有人在低声吟诵，吟诵的内容他听不清，但韵律像极了祖父在世时常哼的那首旧曲。
    char_start: 1601
    char_end: 1714
  - id: p_3_37
    index: 37
    text: 沈默站在缝隙前。身后的古镇、老宅、方晴——都属于当下。缝隙里的微光和声音——属于另一层时间。
    char_start: 1715
    char_end: 1761
  - id: p_3_38
    index: 38
    text: 他没有犹豫。像沈鹤一样，像陆远山一样——他走了进去。
    char_start: 1762
    char_end: 1788
  - id: p_3_39
    index: 39
    text: 雨继续下着。
    char_start: 1789
    char_end: 1795
  - id: p_3_40
    index: 40
    text: 方晴站在老宅二楼的窗前，看着沈默的身影消失在雨幕中。她没有追出去——因为她信任沈默，也因为她从笔记本中读懂了一件事：通道只向选择进入的人开放。
    char_start: 1796
    char_end: 1867
  - id: p_3_41
    index: 41
    text: 她回到密室，拿起笔记本，翻到最后一页的背面——那里还有一行字，是沈默没来得及看到的：
    char_start: 1868
    char_end: 1910
  - id: p_3_42
    index: 42
    text: '"回来的人，会带回答案。但答案——可能比失踪更难面对。"'
    char_start: 1911
    char_end: 1939
  - id: p_3_43
    index: 43
    text: 方晴合上笔记本，望向窗外的雨。雨不知何时会停，但她知道，当雨停的那天——沈默会回来。
    char_start: 1940
    char_end: 1982
  - id: p_3_44
    index: 44
    text: 带着答案。
    char_start: 1983
    char_end: 1988
  - id: p_3_45
    index: 45
    text: 而答案，或许就是这座古镇、这座老宅、和那封每二十年准时送达的信——全部的真相。
    char_start: 1989
    char_end: 2028
  summary: 沈默和方晴赶回老宅发现密室状态改变，发现沈鹤的笔记本记录时间叠影现象。雨幕中沈鹤现身做出邀请手势。沈默推断真相后选择走进雨幕中的时间通道。方晴在老宅等待沈默带回答案。
